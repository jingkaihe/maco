name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/maco

jobs:
  release:
    name: Publish Python package and sandbox image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate release version
        id: version
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION.txt)"
          tag="${GITHUB_REF_NAME}"
          if [[ -z "$version" ]]; then
            echo "VERSION.txt must not be empty" >&2
            exit 1
          fi
          if [[ "$tag" != "v${version}" ]]; then
            echo "Tag $tag does not match VERSION.txt ($version); expected v${version}" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "image_tag=${version}-alpine" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Build Python distributions
        run: uv build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.image_tag }}
            type=sha,prefix=sha-

      - name: Build and push sandbox image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/sandbox/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish Python distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
